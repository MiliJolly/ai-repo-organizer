<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>CustomerAI Dashboard</title>
  <!-- TODO: switch to proper build system, this is all CDN for now -->
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css"/>
  <link rel="stylesheet" href="styles.css"/>
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body>
<nav class="navbar navbar-dark bg-dark px-4">
  <span class="navbar-brand fw-bold">CustomerAI</span>
  <span class="text-secondary small" id="last-updated"></span>
</nav>

<div class="container-fluid mt-3">
  <!-- KPI row -->
  <div class="row g-3 mb-4" id="kpi-row">
    <div class="col-md-3">
      <div class="card kpi-card">
        <div class="card-body">
          <p class="kpi-label">Total Customers</p>
          <h2 class="kpi-value" id="kpi-total">—</h2>
        </div>
      </div>
    </div>
    <div class="col-md-3">
      <div class="card kpi-card">
        <div class="card-body">
          <p class="kpi-label">VIP Customers</p>
          <h2 class="kpi-value text-warning" id="kpi-vip">—</h2>
        </div>
      </div>
    </div>
    <div class="col-md-3">
      <div class="card kpi-card">
        <div class="card-body">
          <p class="kpi-label">Churn Risk (High)</p>
          <h2 class="kpi-value text-danger" id="kpi-churn">—</h2>
        </div>
      </div>
    </div>
    <div class="col-md-3">
      <div class="card kpi-card">
        <div class="card-body">
          <p class="kpi-label">Avg Predicted CLV</p>
          <h2 class="kpi-value text-success" id="kpi-clv">—</h2>
        </div>
      </div>
    </div>
  </div>

  <div class="row g-3">
    <!-- Segment chart -->
    <div class="col-md-5">
      <div class="card">
        <div class="card-header">Customer Segments</div>
        <div class="card-body">
          <canvas id="segmentChart" height="220"></canvas>
        </div>
      </div>
    </div>

    <!-- Customer table -->
    <div class="col-md-7">
      <div class="card">
        <div class="card-header d-flex justify-content-between align-items-center">
          <span>Customers</span>
          <div>
            <select id="segment-filter" class="form-select form-select-sm d-inline-block w-auto me-2">
              <option value="">All Segments</option>
              <option value="VIP">VIP</option>
              <option value="Regular">Regular</option>
              <option value="At-Risk">At-Risk</option>
              <option value="New">New</option>
            </select>
            <input type="text" id="search-input" class="form-control form-control-sm d-inline-block w-auto"
                   placeholder="Search..."/>
          </div>
        </div>
        <div class="card-body p-0">
          <table class="table table-hover table-sm mb-0" id="customer-table">
            <thead class="table-dark">
              <tr>
                <th>ID</th><th>Company</th><th>Segment</th>
                <th>CLV</th><th>Churn Risk</th><th>Actions</th>
              </tr>
            </thead>
            <tbody id="customer-tbody">
              <tr><td colspan="6" class="text-center text-muted py-3">Loading...</td></tr>
            </tbody>
          </table>
        </div>
        <div class="card-footer text-muted small" id="table-footer"></div>
      </div>
    </div>
  </div>

  <!-- Recommendation panel - hidden until customer selected -->
  <div class="row mt-3" id="rec-panel" style="display:none!important">
    <div class="col-12">
      <div class="card">
        <div class="card-header">Recommendations for <span id="rec-customer-name"></span></div>
        <div class="card-body" id="rec-body">Loading...</div>
      </div>
    </div>
  </div>
</div>

<script src="dashboard.js"></script>
</body>
</html>
